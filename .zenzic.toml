# placeholder_patterns = []

# Precedence: .zenzic.toml is shared baseline; .zenzic.local.toml overrides locally.
# Keep secrets and workstation-only values in .zenzic.local.toml.

# --- PROJECT IDENTITY ---
# [project]
# name = "zenzic" # Used for personalized CLI Governance headers

# --- CORE SETTINGS ---
# ---------------------------------------------------------------------------
# docs_dir
# ---------------------------------------------------------------------------
# The relative path to your documentation root.
#
# BEHAVIOR:
#   - If commented out (default), Zenzic uses Auto-Discovery to find your
#     docs based on the engine (reads docusaurus.config.ts, mkdocs.yml…).
#   - Set to "." to scan the entire repository (L1 system exclusions apply).
#
# DEFAULT: Auto-discovered
#
# docs_dir = "."

strict = true
fail_under = 81
# exit_zero = false
# respect_vcs_ignore = true
# validate_same_page_anchors = true

# External URLs excluded from the broken-link check (applies only with --strict)
excluded_external_urls = [
    # Prevents HTTP 429 (Too Many Requests) rate-limiting from GitHub in CI.
    "https://github.com/PythonWoods/zenzic",
    # GitHub API rate-limits unauthenticated CI runners; prefix covers all remaining github.com links.
    "https://github.com",
]


# Z204 Privacy Gate — terms that must never appear in published docs.
# forbidden_patterns = []

# --- EXCLUSION ZONES (Full bypass — use sparingly) ---
excluded_file_patterns = []
# Paths listed here are INVISIBLE to Zenzic: no findings, no audit trail.
# Prefer [governance.per_file_ignores]

[governance.directory_policies]
"docs/assets/**" = ["Z405"]
"docs/blog/**" = ["Z402", "Z101"]
"docs/favicon.ico" = ["Z405"]
"docs/blog/rss.xsl" = ["Z405"]

[governance.per_file_ignores]
# Z501 Didactic Suppressions
"docs/developers/reference/credential-scanner-obligations.md" = ["Z501"]
"docs/explanation/architecture.md" = ["Z501"]
"docs/how-to/add-custom-rules.md" = ["Z501"]
"docs/reference/advanced-features.md" = ["Z501"]
"docs/reference/checks.md" = ["Z501"]
"docs/reference/cli.md" = ["Z501"]
"docs/reference/finding-codes.md" = ["Z501"]
"docs/tutorials/examples/index.md" = ["Z501"]
"docs/tutorials/examples/z5xx-content/z501-placeholder.md" = ["Z501"]
"docs/blog/posts/2026-06-29-10-documentation-bugs-caught-by-zenzic.md" = ["Z501"]
"docs/developers/explanation/adr-vault/records/adr-bilingual-structural.md" = ["Z501"]

"docs/tutorials/examples/z1xx-links/z107-circular-anchor.md" = ["Z107"]
"docs/tutorials/examples/z5xx-content/z506-malformed-frontmatter.md" = ["Z506", "Z503"]
"docs/index.md" = ["Z502"]

"docs/blog/index.md" = ["Z502"]
"docs/blog/posts/2026-06-09-auditing-the-auditors.md" = ["Z503"]
"docs/developers/how-to/contribute/report-a-bug.md" = ["Z107"]
"docs/developers/how-to/contribute/request-a-change.md" = ["Z107"]
