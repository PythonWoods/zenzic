# zenzic.toml — Standalone configuration for the Zenzic Core repository.
#
# This is a "Prose-only Maintenance" config: it scans root-level Markdown
# files (README, CONTRIBUTING, CHANGELOG, SECURITY, etc.) without any
# nav-awareness.  The full documentation site lives in the separate
# zenzic-doc repository, which uses engine = "docusaurus".
#
# ⚠️  SCAN SCOPE INVARIANT: docs_dir = "." ensures that README.md
# and README.it.md are ALWAYS inside the validation scope.
# Do NOT change docs_dir to a subdirectory without explicitly re-adding
# README.md and README.it.md via an include_files entry.
# Rationale: the README is the primary entry point for users; broken links
# there are indistinguishable from broken links in the documentation itself.
#
# 🏛️ LOCAL SOVEREIGNTY: keep machine-specific overrides and private
# credentials in `.zenzic.local.toml` only. Shared `zenzic.toml` is the team
# constitution and must stay reproducible in CI.
#
# 🌿  ZERO-CONFIG NOTE:
#   * Universal build / cache directories (`build`, `dist`, `temp`, `tmp`,
#     `.tox`, `mutants`, plus `.git`, `.venv`, `node_modules`, …) are part
#     of `SYSTEM_EXCLUDED_DIRS` — never repeat them here.
#   * Universal toolchain files (`*.toml`, `*.yaml`, `*.json`, `*.lock`,
#     `LICENSE`, `NOTICE`, `Dockerfile`, `Makefile`, `justfile`, …) are
#     part of `SYSTEM_EXCLUDED_FILE_NAMES` / `SYSTEM_EXCLUDED_FILE_PATTERNS`
#     — never repeat them in `excluded_assets`.
# Only repo-specific entries belong below.

docs_dir = "."

# Repo-specific source / asset trees that are not documentation.
excluded_dirs = [
    "src",
    "tests",
    "scripts",
    "examples",
    "assets",
    "LICENSES",
    ".adversarial",
]

# ADR-039.1: *.sh is in SYSTEM_EXCLUDED_FILE_PATTERNS. No user-level exclusions needed.
# .zenzic.local.toml.example removed in v0.8.0; use `zenzic init --local` to regenerate.
# ADR-039.2: CHANGELOG*.md and RELEASE*.md are scanned without exclusion.
# ROADMAP.md is scanned without exclusion.

# External URLs excluded from the broken-link check (applies only with --strict).
# The GitHub repository URL returns 429 in CI (rate-limited).
# The settings/tokens URL requires authentication (403 for bots).
# All zenzic.dev/* links are subject to --strict validation.
# If a CI runner cannot reach zenzic.dev, pass --exclude-url https://zenzic.dev/
# as a runtime flag rather than encoding the bypass in the config file.
excluded_external_urls = [
    # Prevents HTTP 429 (Too Many Requests) rate-limiting from GitHub when CI checks multiple internal links.
    "https://github.com/PythonWoods/zenzic",
    # Prevents HTTP 403 (Forbidden) / Auth redirects since the CI runner is an unauthenticated bot.
    "https://github.com/settings/tokens",
]

# Pattern matching disabled: the README and CHANGELOG describe placeholder
# patterns as examples, which would cause false positives.
placeholder_patterns = []

snippet_min_lines = 1
placeholder_max_words = 50

[build_context]
engine = "standalone"
# This repo uses engine = "standalone" because docs_dir = "." scans root-level
# Markdown prose (README, CONTRIBUTING, CHANGELOG, etc.) with no nav contract.
# The actual documentation site lives in the separate zenzic-doc repository,
# which uses engine = "docusaurus" with i18n locale roots auto-authorised by the
# Multi-Root Exclusion Scope. No locales key is needed here.

# ── Internal dogfood rules ────────────────────────────────────────────────────
# Minimal rule set for root-level prose files.

[[custom_rules]]
id = "ZZ-NOCLICKHERE"
pattern = "(?i)\\bclick here\\b|\\bclicca qui\\b"
message = "Avoid generic link text. Use a meaningful description for accessibility."
severity = "error"

# ADR-075 — Inconsapevolezza Radicale: intercept the term 'ai' with word-boundary
# to avoid the false-positive flood that literal substring match would cause.
# (Literal 'ai' in forbidden_patterns would fire on 'main', 'mail', 'said', etc.)
[[custom_rules]]
id = "ZZ-ADR075-AI"
pattern = "(?i)\\bai\\b"
message = "Il termine 'ai' viola ADR-075 (Inconsapevolezza Radicale). Zenzic è un Analizzatore Statico della Documentazione agnostico rispetto a qualsiasi tecnologia di inferenza."
severity = "error"

# ── Brand integrity ──────────────────────────────────────────────────────────
# Detect deprecated brand terms in documentation source (Z601).
# Use zenzic-ignore inline to suppress intentional references (e.g. release codenames).
[project_metadata]
release_name = "Basalt"
obsolete_names_exclude_patterns = ["CHANGELOG*.md", "CHANGELOG*.archive.md", "changelogs/*.md"]

[governance]
# Suppression CAP (ADR-061): allowance of governance-approved exemptions.
# Suppressions up to this value do not reduce score. Only excess deducts points.
# Run 'zenzic explain ZXXX' to see the exact penalty for any rule.
suppression_cap = 7
suppression_cap_fail_hard = true

# Per-file suppression map: silence a rule for specific file globs.
# WARNING: Every entry increases your Technical Debt Score (see formula above).
# Use 'zenzic check --audit' to see what would be flagged without suppressions.
# [governance.per_file_ignores]
# "docs/legacy/**" = ["Z601"]   # intentional brand refs → -1 pt

# brand_obsolescence: project-specific deprecated terms (Z601 BRAND_OBSOLESCENCE).
# Permanent vocabulary guardian — fires if theatrical brand terms reappear in prose.
brand_obsolescence = [
    "Sentinel",
    "Shield",
    "Blood",
    "Basalt",
    "Quartz",
    "Obsidian",
]
