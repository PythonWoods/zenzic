#
# Pre-commit hooks for Zenzic — engine-agnostic Markdown linter.
#
# Usage in your .pre-commit-config.yaml:
#
#   repos:
#     - repo: https://github.com/PythonWoods/zenzic
#       rev: v0.7.0  # Era della Chiarezza
#       hooks:
#         - id: zenzic-verify    # gate Sentinel — corrisponde a `just verify` lato zenzic
#
# See https://zenzic.dev/ci-cd/ for full integration guide.

- id: zenzic-verify
  name: zenzic verify (Sentinel gate)
  description: >-
    Sentinel gate equivalent of `just verify` (Zenzic portion only — does not
    invoke pytest). Runs all documentation quality checks in --strict posture.
  entry: zenzic check all --strict --quiet
  language: python
  types: [markdown]
  pass_filenames: false
  require_serial: true

- id: zenzic-check-links
  name: zenzic check links
  description: Check for broken internal links in documentation.
  entry: zenzic check links
  language: python
  types: [markdown]
  pass_filenames: false

- id: zenzic-check-references
  name: zenzic check references
  description: Run the Two-Pass Reference Pipeline and Zenzic Shield (credential detection).
  entry: zenzic check references
  language: python
  types: [markdown]
  pass_filenames: false
  require_serial: true

- id: zenzic-score
  name: zenzic score
  description: Compute documentation quality score and fail if below threshold.
  entry: zenzic score --fail-under 80
  language: python
  types: [markdown]
  pass_filenames: false
