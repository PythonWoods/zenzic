#
# Pre-commit hooks for Zenzic — engine-agnostic Markdown linter.
#
# Usage in your .pre-commit-config.yaml:
#
#   repos:
#     - repo: https://github.com/PythonWoods/zenzic
#       rev: v0.17.0
#       hooks:
#         - id: zenzic-verify    # quality gate — corrisponde a `just verify` lato zenzic
#         - id: zenzic-guard     # fast staged-file credential scan
#
# See https://zenzic.dev/ci-cd/ for full integration guide.

- id: zenzic-verify
  name: zenzic verify (integrity gate)
  description: >-
    Full documentation integrity audit (Zenzic check all).
    Equivalent to the Zenzic portion of just verify.
  entry: zenzic check all --strict --quiet
  language: python
  types_or: [markdown, mdx]
  pass_filenames: false
  require_serial: true

- id: zenzic-guard
  name: zenzic guard (Credential Scanner)
  description: Fast staged-file secret detection for Markdown/MDX.
  entry: zenzic guard scan --staged
  language: python
  types_or: [markdown, mdx]
  pass_filenames: false
  require_serial: true

- id: zenzic-check-links
  name: zenzic check links
  description: Check for broken internal links in documentation.
  entry: zenzic check links
  language: python
  types_or: [markdown, mdx]
  pass_filenames: false

- id: zenzic-check-references
  name: zenzic check references
  description: Run the Two-Pass Reference Pipeline and credential detection.
  entry: zenzic check references
  language: python
  types_or: [markdown, mdx]
  pass_filenames: false
  require_serial: true

- id: zenzic-score
  name: zenzic score
  description: Compute documentation quality score and fail if below threshold.
  entry: zenzic score --fail-under 100
  language: python
  types_or: [markdown, mdx]
  pass_filenames: false
