# mkdocs.yml — MkDocs configuration for documentation builds and local preview.

site_name: Zenzic
site_url: https://zenzic.pythonwoods.dev/
repo_name: PythonWoods/zenzic
repo_url: https://github.com/PythonWoods/zenzic
edit_uri: edit/main/docs/
site_description: High-performance documentation linter for MkDocs, Zensical, and any Markdown project.
copyright: © 2026 PythonWoods

theme:
  name: material
  custom_dir: overrides
  favicon: assets/favicon/zenzic-icon.svg
  logo: assets/brand/svg/zenzic-icon.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - content.tabs.link
    - content.code.copy
    - navigation.indexes
    - navigation.path
    - navigation.top
    - navigation.header.version
    - navigation.footer
    - search.highlight
    - search.suggest

plugins:
  - search
  - social:
      cards_layout_options:
        background_color: "#0d1117"
        color: "#38bdf8"
  - minify:
      minify_html: true
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_root_heading: true
            show_source: true
            merge_init_into_class: true
            separate_signature: true
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
          link: /
        - locale: it
          name: Italiano
          build: true
          link: /it/
          nav_translations:
            Home: Home
            Docs: Docs
            Overview: Panoramica
            User Guide: Guida Utente
            Getting Started: Primi Passi
            CLI Commands: Comandi CLI
            Advanced Features: Funzionalità Avanzate
            Available Checks: Controlli Disponibili
            Configuration: Configurazione
            Core Settings: Impostazioni di Base
            Adapters & Engine: Adapter e Motore
            Custom Rules DSL: DSL Regole Custom
            Engines: Motori
            Migration Guide: Guida alla Migrazione
            CI/CD Integration: Integrazione CI/CD
            Badges: Badge
            FAQs: FAQ
            Developer Guide: Guida Sviluppatore
            Architecture: Architettura
            API Reference: Riferimento API
            Writing an Adapter: Scrivere un Adapter
            Example Projects: Progetti di Esempio
            About: Informazioni
            Philosophy: Filosofia
            License: Licenza
            Brand Kit: Brand Kit
            Community: Comunità
            Get Involved: Partecipa
            How to Contribute: Come Contribuire
            Report a Bug: Segnala un Bug
            Docs Issue: Problema nei Docs
            Change Request: Richiesta di Modifica
            Pull Requests: Pull Request

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - abbr
  - pymdownx.details
  - pymdownx.magiclink
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - overrides/.icons

extra_css:
  - assets/stylesheets/extra.css

extra:
  build_date: !ENV [BUILD_DATE, "dev"]
  generator: false
  version: "0.5.0a1"
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/PythonWoods/zenzic
      name: PythonWoods/zenzic on GitHub
    - icon: fontawesome/solid/globe
      link: https://pythonwoods.dev
      name: PythonWoods Website
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/zenzic/
      name: zenzic on PyPI

nav:
  - Home: index.md
  - Docs:
      - Overview: guide/index.md
      - User Guide:
          - Getting Started: usage/index.md
          - CLI Commands: usage/commands.md
          - Advanced Features: usage/advanced.md
          - Available Checks: checks.md
          - Configuration:
              - Overview: configuration/index.md
              - Core Settings: configuration/core-settings.md
              - Adapters & Engine: configuration/adapters-config.md
              - Custom Rules DSL: configuration/custom-rules-dsl.md
          - Engines: guide/engines.md
          - Migration Guide: guide/migration.md
          - CI/CD Integration: ci-cd.md
          - Badges: usage/badges.md
          - FAQs: community/faqs.md
      - Developer Guide:
          - Contributor Guide: developers/index.md
          - Architecture: architecture.md
          - API Reference: reference/api.md
          - Writing an Adapter: developers/writing-an-adapter.md
          - Example Projects: developers/examples.md
      - Community:
          - Get Involved: community/index.md
          - How to Contribute: community/contribute/index.md
          - Report a Bug: community/contribute/report-a-bug.md
          - Docs Issue: community/contribute/report-a-docs-issue.md
          - Change Request: community/contribute/request-a-change.md
          - Pull Requests: community/contribute/pull-requests.md
      - About:
          - Overview: about/index.md
          - Philosophy: about/philosophy.md
          - License: about/license.md
          - Brand Kit: about/brand-kit.md
