# zenzic.toml вҖ” Standalone configuration for the Zenzic Core repository.
#
# This is a "Prose-only Maintenance" config: it scans root-level Markdown
# files (README, CONTRIBUTING, CHANGELOG, SECURITY, etc.) without any
# nav-awareness.  The full documentation site lives in the separate
# zenzic-doc repository, which uses engine = "docusaurus".
#
# вҡ пёҸ  PERIMETER INVARIANT (v0.6.2): docs_dir = "." ensures that README.md
# and README.it.md are ALWAYS inside the validation perimeter.
# Do NOT change docs_dir to a subdirectory without explicitly re-adding
# README.md and README.it.md via an include_files entry.
# Rationale: the README is the primary entry point for users; broken links
# there are indistinguishable from broken links in the documentation itself.
#
# рҹҢҝ  ZERO-CONFIG NOTE (v0.7.1):
#   * Universal build / cache directories (`build`, `dist`, `temp`, `tmp`,
#     `.tox`, `mutants`, plus `.git`, `.venv`, `node_modules`, вҖҰ) are part
#     of `SYSTEM_EXCLUDED_DIRS` вҖ” never repeat them here.
#   * Universal toolchain files (`*.toml`, `*.yaml`, `*.json`, `*.lock`,
#     `LICENSE`, `NOTICE`, `Dockerfile`, `Makefile`, `justfile`, вҖҰ) are
#     part of `SYSTEM_EXCLUDED_FILE_NAMES` / `SYSTEM_EXCLUDED_FILE_PATTERNS`
#     вҖ” never repeat them in `excluded_assets`.
# Only repo-specific entries belong below.

docs_dir = "."

# Repo-specific source / asset trees that are not documentation.
excluded_dirs = [
    "src",
    "tests",
    "scripts",
    "examples",
    "assets",
    "LICENSES",
    ".redteam",
]

# Historical changelogs contain example secrets and deprecated syntax
# snippets that would trigger Shield and Snippet false positives.
excluded_file_patterns = ["CHANGELOG*.md"]

# Cross-repo documentation links and CHANGELOG history that are still
# referenced as link targets вҖ” suppress FILE_NOT_FOUND for them.
excluded_build_artifacts = [
    "CHANGELOG*.md",
    ".github/workflows/*.yml",
]

# External URLs excluded from the broken-link check (applies only with --strict).
# The GitHub repository URL returns 429 in CI (rate-limited).
# The settings/tokens URL requires authentication (403 for bots).
# NOTE: the previous blanket https://zenzic.dev/ exclusion has been REMOVED (v0.6.2).
# All zenzic.dev/* links are now subject to --strict validation.
# If a CI runner cannot reach zenzic.dev, pass --exclude-url https://zenzic.dev/
# as a runtime flag rather than encoding the bypass in the config file.
excluded_external_urls = [
    "https://github.com/PythonWoods/zenzic",
    "https://github.com/settings/tokens",
    # Release Bridge: blog post slug updated вҖ” remove exclusion 5 min after v0.7.0 GA deploy
    "https://zenzic.dev/blog/beyond-the-siege-v070-quartz",
    "https://zenzic.dev/blog/beyond-the-siege-zenzic-v070",
    # Release Bridge: audit report page вҖ” pre-deployment forward reference; remove after v0.7.0 GA deploy
    "https://zenzic.dev/docs/explanation/audit-v070-quartz-siege",
]

# Pattern matching disabled: the README and CHANGELOG describe placeholder
# patterns as examples, which would cause false positives.
placeholder_patterns = []

snippet_min_lines = 1
placeholder_max_words = 50

[build_context]
engine = "standalone"
# This repo uses engine = "standalone" because docs_dir = "." scans root-level
# Markdown prose (README, CONTRIBUTING, CHANGELOG, etc.) with no nav contract.
# The actual documentation site lives in the separate zenzic-doc repository,
# which uses engine = "docusaurus" with i18n locale roots auto-authorised by the
# Multi-Root Safe Harbor (v0.7.0+).  No locales key is needed here.

# в”Җв”Җ Internal dogfood rules в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Minimal rule set for root-level prose files.

[[custom_rules]]
id       = "ZZ-NOCLICKHERE"
pattern  = "(?i)\\bclick here\\b|\\bclicca qui\\b"
message  = "Avoid generic link text. Use a meaningful description for accessibility."
severity = "error"

# в”Җв”Җ Brand integrity в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Detect deprecated brand terms in documentation source (Z905).
# CHANGELOG*.md is excluded by default (historical prose allowed).
# Use [HISTORICAL] inline to suppress intentional references in other files.
[project_metadata]
release_name = "Quartz"
obsolete_names = ["Obsidian", "Ossidiana"]
