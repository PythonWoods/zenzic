name: Zenzic VS Code CI

on:
  push:
    branches: [ main, "release/**" ]
    paths:
      - 'vscode/**'
      - '.github/workflows/ci-vscode.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'vscode/**'
      - '.github/workflows/ci-vscode.yml'

permissions:
  contents: read

jobs:
  verify:
    name: Verify & Package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: vscode/package-lock.json

      - name: Setup uv (for REUSE compliance tool)
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install REUSE
        run: uv tool install reuse

      - name: Install NPM Dependencies
        run: npm ci

      - name: Run Quality Gates
        run: just verify

      - name: Test VSIX Packaging
        run: npx @vscode/vsce package

      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zenzic-vscode-extension
          path: "vscode/*.vsix"
          retention-days: 7
