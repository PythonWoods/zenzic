name: Zenzic Actions CI

on:
  push:
    branches: [main, "release/**"]
    paths:
      - 'actions/**'
      - '.github/workflows/ci-actions.yml'
  pull_request:
    branches: [main]
    paths:
      - 'actions/**'
      - '.github/workflows/ci-actions.yml'

permissions:
  contents: read
  security-events: write  # required for upload-sarif

jobs:
  verify:
    name: Verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            lint: true
    defaults:
      run:
        shell: bash
        working-directory: actions
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install just
        uses: taiki-e/install-action@ea85faa6acd705ad6d40586db99f1a70b09c2929 # just

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Run Zenzic Quality Gate
        shell: bash
        env:
          ZENZIC_CORE_PATH: ../core
          ZENZIC_EXTRA_ARGS: ${{ secrets.ZENZIC_EXTRA_ARGS }}
        run: |
          if [[ "${{ matrix.lint }}" == "true" ]]; then
            just verify
          else
            just check
            just test
          fi

      - name: Test Action Locally
        uses: ./actions
        with:
          working-directory: tests/fixture
          check-stamp: "false"
          upload-sarif: "false"

      - name: Test Action Locally with Z001 Config Error Fixture
        id: test-z001
        uses: ./actions
        continue-on-error: true
        with:
          working-directory: ../core/examples/z001-config-error
          fail-on-error: "true"
          check-stamp: "false"
          upload-sarif: "false"

      - name: Assert Z001 Failure
        shell: bash
        run: |
          if [[ "${{ steps.test-z001.outcome }}" != "failure" ]]; then
            echo "::error::Expected action to fail on Z001 config-error fixture, but it passed."
            exit 1
          fi
          echo "✓ Action correctly failed on Z001 configuration error."
