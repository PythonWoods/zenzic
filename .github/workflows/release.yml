name: Zenzic Core Release

on:
  push:
    tags:
      - "core-v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Sync dependencies (frozen lockfile)
        run: uv sync --project core --all-groups --all-extras --frozen

      - name: Build
        run: uv build --project core

      - name: Package brand kit
        run: zip -qr brand-kit.zip assets/brand/

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*

      # --- DISABILITATO TEMPORANEAMENTE ---
      # - name: Publish to PyPI
      #   run: uv publish
      # -------------------------------------

      - name: Generate GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: |
            dist/*
            brand-kit.zip
          generate_release_notes: true
          make_latest: true
