name: Zenzic Core Release

on:
  push:
    tags:
      - "core-v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Sync dependencies (frozen lockfile)
        run: uv sync --project core --all-groups --all-extras --frozen

      - name: Build
        run: uv build --project core

      - name: Package brand kit
        run: zip -qr brand-kit.zip assets/brand/

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*

      # --- DISABILITATO TEMPORANEAMENTE ---
      # - name: Publish to PyPI
      #   run: uv publish
      # -------------------------------------

      - name: Generate GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          files: |
            dist/*
            brand-kit.zip
          generate_release_notes: true
          make_latest: true
