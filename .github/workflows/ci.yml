name: CI

on:
  push:
    branches:
      - main
      - 'release/**'
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'noxfile.py'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - main
      - 'release/**'
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'noxfile.py'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  verify:
    name: Verify (${{ matrix.os }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    # Allow the 3.13-dev experimental slot to fail without blocking the workflow.
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: true
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python:
          - '3.10'
          - '3.11'
          - '3.12'
        exclude:
          # Windows path/encoding/binary checks are version-independent;
          # a single validation on 3.12 is sufficient.
          - os: windows-latest
            python: '3.10'
          - os: windows-latest
            python: '3.11'
        include:
          # Sentinel: warns us early if a future CPython release breaks Zenzic.
          # Allowed to fail — does not block the release.
          - os: ubuntu-latest
            python: '3.13-dev'
            experimental: true
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Run unified verification
        shell: bash
        # ZRT-010 — Sovereign Parity: Pre-Launch Guard lives in justfile.
        # Local and CI run identical 'just check' invocations.
        run: just verify
