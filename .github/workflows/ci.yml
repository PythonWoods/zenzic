name: CI

on:
  push:
    branches: [main, 'release/**']
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, 'release/**']
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  verify:
    name: Verify (Py ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Pillar Matrix: test the boundaries (Floor/Peak) on Linux
        # and use a stable anchor for Windows/macOS.
        os: [ubuntu-latest]
        python-version: ["3.10", "3.14"]
        include:
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install just
        uses: taiki-e/install-action@ea85faa6acd705ad6d40586db99f1a70b09c2929 # just

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --all-groups --frozen

      - name: Run unified verification
        shell: bash
        env:
          # Runtime-only injection point for local isolation checks in CI.
          ZENZIC_EXTRA_ARGS: ${{ secrets.ZENZIC_EXTRA_ARGS }}
        run: just verify

      - name: Export Zenzic Score badge
        # Run only on push to the canonical branch with Python 3.14 on Linux
        # to produce a single authoritative write per commit.
        if: >
          github.event_name == 'push' &&
          matrix.os == 'ubuntu-latest' &&
          matrix.python-version == '3.14'
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          uv run --active zenzic score --export-shields zenzic-shields.json
          gh gist edit 7a26bc9e0a919beded93b6c5cd055bf9 zenzic-shields.json
