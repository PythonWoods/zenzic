name: Zenzic Core CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  verify:
    name: Audit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Pillar Matrix: test the boundaries (Floor/Peak) on Linux
        # and use a stable anchor for Windows/macOS.
        os: [ubuntu-latest]
        python-version: ["3.10", "3.14"]
        # include:
        #   - os: windows-latest
        #     python-version: "3.12"
        #   - os: macos-latest
        #     python-version: "3.12"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install just
        uses: taiki-e/install-action@ea85faa6acd705ad6d40586db99f1a70b09c2929 # just

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --all-groups --frozen

      - name: Run unit tests
        run: just test

      - name: Run Zenzic Quality Gate
        run: uv run zenzic check all . --strict --ci

      - name: Verify Badge Freshness
        run: uv run zenzic score --check-stamp --ci
