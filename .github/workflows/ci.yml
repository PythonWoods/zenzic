name: Zenzic Core CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Audit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Pillar Matrix: test the boundaries (Floor/Peak) on Linux
        # and use a stable anchor for Windows/macOS.
        os: [ubuntu-latest]
        python-version: ["3.10", "3.14"]
        # include:
        #   - os: windows-latest
        #     python-version: "3.12"
        #   - os: macos-latest
        #     python-version: "3.12"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install just
        uses: taiki-e/install-action@ea85faa6acd705ad6d40586db99f1a70b09c2929 # just

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --all-groups --all-extras --frozen

      - name: Run unit tests
        run: just test

      - name: Run Zenzic Quality Gate
        run: uv run zenzic check all --strict --format github-annotations --ci

      - name: Build Docs
        run: uv run mkdocs build --strict

      - name: Verify Badge Freshness
        run: uv run zenzic score --check-stamp --ci
