name: CI

on:
  push:
    branches:
      - main
      - 'release/**'
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'noxfile.py'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - main
      - 'release/**'
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'noxfile.py'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  verify:
    name: Verify (${{ matrix.os }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        # Pillar Matrix (v0.7.0):
        #   Floor          → 3.10  (oldest supported; enforces minimum compat)
        #   Peak / Windows → 3.14  (latest stable; primary target + Windows anchor)
        include:
          # ── Ubuntu Floor ──────────────────────────────────────────────────
          - os: ubuntu-latest
            python: '3.10'
          # ── Ubuntu Peak ───────────────────────────────────────────────────
          - os: ubuntu-latest
            python: '3.14'
          # ── Windows Stable ────────────────────────────────────────────────
          # Validates path separators, binary encoding, and shell compat.
          - os: windows-latest
            python: '3.14'
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Run unified verification
        shell: bash
        # ZRT-010 — Sovereign Parity: Pre-Launch Guard lives in justfile.
        # Local and CI run identical 'just check' invocations.
        run: just verify
