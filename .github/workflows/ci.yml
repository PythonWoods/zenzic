name: CI

on:
  push:
    branches:
      - main
      - 'release/**'
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'noxfile.py'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - main
      - 'release/**'
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'noxfile.py'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  verify:
    name: Verify (${{ matrix.os }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    # Allow the experimental Sentinel slot to fail without blocking the workflow.
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: true
      matrix:
        # Pillar Matrix (v0.7.0 / EPOCH 4):
        #   Floor    → 3.10  (oldest supported; enforces minimum compat)
        #   Peak     → 3.14  (latest stable; primary target + Windows anchor)
        #   Sentinel → 3.15  (Ubuntu only; alpha/beta early-warning probe for next CPython)
        # Windows runs stable 3.14 only: path/encoding/binary validation is
        # version-independent; a stable anchor avoids nightly-build regressions
        # blocking the release pipeline.
        include:
          # ── Ubuntu Floor ──────────────────────────────────────────────────
          - os: ubuntu-latest
            python: '3.10'
            experimental: false
          # ── Ubuntu Peak ──────────────────────────────────────────────────
          - os: ubuntu-latest
            python: '3.14'
            experimental: false
          # ── Ubuntu Sentinel ────────────────────────────────────────────
          # Warns early if the next CPython release breaks Zenzic.
          # Allowed to fail — does not block the release.
          - os: ubuntu-latest
            python: '3.15'
            experimental: true
          # ── Windows Stable ─────────────────────────────────────────────
          # Validates path separators, binary encoding, and shell compat on the
          # latest stable CPython — anchored to avoid nightly regression noise.
          - os: windows-latest
            python: '3.14'
            experimental: false
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python }}
        # --prerelease allow is injected before the version (flag-first, uv convention)
        # and only for experimental slots (Sentinel 3.15). Stable slots need no flag.
        run: >
          uv python install
          ${{ matrix.experimental && '--prerelease allow' || '' }}
          ${{ matrix.python }}

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Run unified verification
        shell: bash
        # ZRT-010 — Sovereign Parity: Pre-Launch Guard lives in justfile.
        # Local and CI run identical 'just check' invocations.
        run: just verify
