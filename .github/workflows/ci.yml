name: CI

on:
  push:
    branches:
      - main
      - 'release/**'
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'noxfile.py'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - main
      - 'release/**'
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'noxfile.py'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Run unified verification
        env:
          # Pre-Launch Guard Pattern: runtime exclusion for pre-launch assets.
          # zenzic.dev and the v0.7.0 GitHub release tag are not yet publicly
          # reachable at CI time. Injected at runtime — zenzic.toml stays clean.
          # Remove after GA deploy when all URLs resolve.
          ZENZIC_EXTRA_ARGS: >-
            --exclude-url https://zenzic.dev/
            --exclude-url https://github.com/PythonWoods/zenzic/releases/tag/v0.7.0
        run: just verify
