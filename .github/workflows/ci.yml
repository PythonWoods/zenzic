name: CI

on:
  push:
    branches: [main, 'release/**']
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, 'release/**']
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  verify:
    name: Verify (Py ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Pillar Matrix: test the boundaries (Floor/Peak) on Linux
        # and use a stable anchor for Windows/macOS.
        os: [ubuntu-latest]
        python-version: ["3.10", "3.14"]
        include:
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Run unified verification
        shell: bash
        env:
          # ZENZIC_EXTRA_ARGS: Injects runtime flags into 'just verify'.
          # Example: "--no-external" to skip network-dependent link checks.
          # Default: Empty (full strictness).
          ZENZIC_EXTRA_ARGS: ""
        run: just verify
