# .zenzic.toml — Z301 DANGLING_REF gallery example
#
# docs/index.md uses [Click here][missing-ref] — a reference-style link whose
# ID "missing-ref" is never defined in a [id]: url definition.
# Zenzic's reference scanner flags it as Z301 DANGLING_REF — exit 1.
#
# Expected results:
#   zenzic check references   → EXIT 1  (Z301 ×1 — 'missing-ref' undefined)
#   zenzic check all          → EXIT 1

docs_dir = "docs"
fail_under = 0

[build_context]
engine = "standalone"
