# .zenzic.toml — Z110 STALE_ALLOWLIST_ENTRY gallery example
#
# absolute_path_allowlist contains "/legacy/unused/path/".
# docs/index.md contains no links starting with this prefix.
# Zenzic flags it as Z110 STALE_ALLOWLIST_ENTRY — warning on configuration.
#
# Expected results:
#   zenzic check all   → EXIT 0  (warning only)
#   zenzic check links --strict  → EXIT 1

docs_dir = "docs"
fail_under = 0
absolute_path_allowlist = ["/legacy/unused/path/"]

[build_context]
engine = "standalone"
