# zenzic.toml — CLI configuration for the broken-docs example.
#
# This example intentionally triggers every Zenzic check except nav-contract
# and references. Run `zenzic check all` to see the full failure report.
# Run `zenzic check all --exit-zero` to suppress the non-zero exit code.
#
# api.md and orphan-nav.md are intentionally absent from the nav (see mkdocs.yml)
# to trigger the orphan and UNREACHABLE_LINK checks.
# _drafts/unreleased.md is in a private directory to trigger the Zensical
# private-directory UNREACHABLE_LINK rule (when running with engine = "zensical").

docs_dir = "docs"

# Zenzic Shield — built-in credential scanner (always active, no config required).
# Detected pattern families: openai-api-key, github-token, aws-access-key,
#   stripe-live-key, slack-token, google-api-key, private-key,
#   hex-encoded-payload (3+ consecutive \xNN sequences).
# All lines including fenced code blocks are scanned. Exit code 2 on detection.

[build_context]
engine = "mkdocs"
placeholder_max_words = 50
placeholder_patterns = ["TODO", "coming soon", "stub"]

# Demonstrates the [[custom_rules]] DSL: flag any remaining FIXME markers.
[[custom_rules]]
id       = "ZZ-NOFIXME"
pattern  = "(?i)\\bFIXME\\b"
message  = "FIXME markers must be resolved before publishing."
severity = "error"
