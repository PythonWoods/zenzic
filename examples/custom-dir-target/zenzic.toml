# zenzic.toml — custom-dir-target example.
#
# The project's default docs_dir points to "docs/" as usual, but content
# lives in "content/" (a Hugo/Docusaurus-style layout).
#
# Running `zenzic check all content/` patches docs_dir at runtime and
# audits the content/ tree without changing this file.
#
# Target: zenzic check all content/ → SUCCESS

docs_dir = "docs"

# Zenzic Shield — built-in credential scanner (always active, no config required).
# Detected pattern families: openai-api-key, github-token, aws-access-key,
#   stripe-live-key, slack-token, google-api-key, private-key,
#   hex-encoded-payload (3+ consecutive \xNN sequences).
# All lines including fenced code blocks are scanned. Exit code 2 on detection.

[build_context]
engine = "standalone"
