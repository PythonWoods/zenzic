# zenzic.toml — Vanilla (engine-agnostic) example.
#
# No mkdocs.yml, no zensical.toml, no build engine of any kind.
# Zenzic runs in Vanilla mode: links, snippets, placeholders, and assets
# are all checked. The orphan check is skipped (no nav to compare against).
#
# Use this mode for Hugo, Docusaurus, Sphinx, Astro, hand-written HTML,
# or any project where you want documentation quality gates without
# committing to a specific build toolchain.
#
# Target: zenzic check all → SUCCESS

docs_dir = "docs"

# Enforce a minimum quality floor.
fail_under = 80

# Zenzic Shield — built-in credential scanner (always active, no config required).
# Detected pattern families: openai-api-key, github-token, aws-access-key,
#   stripe-live-key, slack-token, google-api-key, private-key,
#   hex-encoded-payload (3+ consecutive \xNN sequences).
# All lines including fenced code blocks are scanned. Exit code 2 on detection.

[build_context]
engine = "vanilla"

# Project-specific lint rule: no inline HTML in docs.
[[custom_rules]]
id       = "ZZ-NOHTML"
pattern  = "<(?!--)[a-zA-Z]"
message  = "Avoid raw HTML in Markdown — use native Markdown syntax instead."
severity = "warning"
