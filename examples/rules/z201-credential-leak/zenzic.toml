# zenzic.toml — Z201 CREDENTIAL_SECRET demo (Act 14 — Lab)
#
# Demonstrates Z201: a plaintext AWS access key in a documentation file triggers
# the credential scanner (safe_read_line middleware), raises CredentialViolation,
# and produces exit code 2 (SECURITY BREACH).
#
# Expected results:
#   zenzic check credentials  → EXIT 2  (Z201 × 1 — aws-access-key)
#   zenzic check all          → EXIT 2  (security tier overrides quality score)

docs_dir = "docs"
fail_under = 0

[build_context]
engine = "standalone"
