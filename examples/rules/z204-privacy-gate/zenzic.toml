# zenzic.toml — Privacy Gate (Act 20 — Enterprise Z204)
#
# Demonstrates Z204 FORBIDDEN_TERM: the Privacy Gate that blocks confidential
# terms from leaking into public documentation.
#
# The forbidden patterns are declared in .zenzic.local.toml (never committed
# in production — this example commits it for demonstration purposes only).
# Zenzic merges .zenzic.local.toml at runtime, then fires Z204 for every match.
#
# Expected results:
#   zenzic check references  → EXIT 2  (Z204: forbidden term found in docs/)
#   zenzic check all         → EXIT 2

docs_dir = "docs"
fail_under = 0

[build_context]
engine = "standalone"
