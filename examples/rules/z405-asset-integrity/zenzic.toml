# zenzic.toml — Asset Integrity (Z405 + Z406)
#
# Exercises UNUSED_ASSET and NAV_CONTRACT violations.
#
# Expected results:
#   zenzic check assets    → EXIT 1  (Z405 ×1)
#   zenzic check nav       → EXIT 1  (Z406 ×1)
