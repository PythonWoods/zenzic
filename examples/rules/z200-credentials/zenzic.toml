# zenzic.toml — Credential Extreme (Act 14 — Red Team Matrix)
#
# RED TEAM: Credential exposure in unusual Markdown contexts —
#           tables, blockquotes, HTML comments, link titles, mixed-case keys.
# BLUE TEAM: Zenzic credential scanner scans every source line regardless of Markdown structure.
#
# Expected results:
#   zenzic check references  → EXIT 2  (Z201: credential breach — credentials in all files)
#   zenzic check all         → EXIT 2

docs_dir = "docs"
fail_under = 0

[build_context]
engine = "standalone"
