# zenzic.toml — Reference Graph Integrity (Z300 series)
#
# Exercises dangling references, dead definitions, and duplicate definitions.
#
# Expected results:
#   zenzic check references  → EXIT 1  (Z301 ×1, Z302 ×1, Z303 ×1)
#   zenzic check all         → EXIT 1

docs_dir = "docs"
fail_under = 0

[build_context]
engine = "standalone"
