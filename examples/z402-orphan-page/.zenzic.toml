# .zenzic.toml — Z402 ORPHAN_PAGE gallery example
#
# This sandbox uses the zensical engine so that find_orphans() can inspect
# the navigation manifest. docs/secret.md exists on disk but is NOT listed
# in zensical.toml nav — it is ORPHAN_BUT_EXISTING → Z402 ORPHAN_PAGE.
#
# With the standalone engine find_orphans() returns [] (no nav to compare).
# The zensical adapter reads zensical.toml and detects the unlisted page.
#
# Expected results:
#   zenzic check assets   → EXIT 1  (Z402 ×1 — docs/secret.md not in nav)
#   zenzic check all      → EXIT 1

docs_dir = "docs"
fail_under = 0

[build_context]
engine = "zensical"
