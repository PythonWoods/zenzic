# zenzic.toml — Zensical Transparent Proxy (Bridge) example.
#
# engine = "zensical" is declared, but NO zensical.toml is present.
# Zenzic detects the mkdocs.yml and automatically activates the
# ZensicalLegacyProxy (Transparent Bridge), delegating all checks to
# MkDocsAdapter internally.
#
# The Zenzic Banner is printed on stdout at runtime:
#   ZENZIC: Zensical engine active via mkdocs.yml compatibility bridge.
#
# This is NOT a silent fallback. The banner ensures engine identity is
# always transparent to the operator.
#
# Run: zenzic check all
# Expected: Zenzic banner + all checks pass

docs_dir = "docs"
fail_under = 90

# ── Governance (Z601 BRAND_OBSOLESCENCE) ─────────────────────────────────────
# Detect deprecated release codename "Obsidian" in the documentation.
# This fixture intentionally contains one reference in docs/index.md to
# demonstrate the Z601 finding in ruff-style flat output.
[governance]
brand_obsolescence = ["OldBrand", "LegacyName", "OldCodename", "PreviousName", "FormerName", "Chronicles"]

# Credential scanner — built-in credential scanner (always active, no config required).
# Detected pattern families: openai-api-key, github-token, aws-access-key,
#   stripe-live-key, slack-token, google-api-key, private-key,
#   hex-encoded-payload (3+ consecutive \xNN sequences).
# All lines including fenced code blocks are scanned. Exit code 2 on detection.

[build_context]
engine = "zensical"
