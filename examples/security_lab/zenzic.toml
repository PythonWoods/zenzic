# zenzic.toml — Security Lab configuration.
#
# This example intentionally triggers the Zenzic credential scanner (credential detection)
# and the link checker (path traversal, absolute links).
#
# Expected results:
#   zenzic check links   → EXIT 1  (path traversal in traversal.md + attack.md)
#   zenzic check references → EXIT 2  (credential scanner: credentials in attack.md)
#   zenzic check all     → EXIT 2  (credential scanner takes priority)

docs_dir = "docs"

[build_context]
engine = "mkdocs"
