# zenzic.toml — MkDocs 1.x baseline fixture.
#
# This example intentionally contains two demo findings to show Zenzic's
# detection capabilities:
#
#   • FILE_NOT_FOUND — guide/index.md links to ../deployment.md (absent)
#   • BROKEN_ANCHOR  — api.md links to guide/index.md#advanced-configuration
#                       (anchor does not exist)
#
# Run: zenzic check all
# Expected: two findings reported, exit code 1

docs_dir = "docs"
fail_under = 0

# Zenzic Shield — built-in credential scanner (always active, no config required).
# Detected pattern families: openai-api-key, github-token, aws-access-key,
#   stripe-live-key, slack-token, google-api-key, private-key,
#   hex-encoded-payload (3+ consecutive \xNN sequences).
# All lines including fenced code blocks are scanned. Exit code 2 on detection.

[build_context]
engine = "mkdocs"
