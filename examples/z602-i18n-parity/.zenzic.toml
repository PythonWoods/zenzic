# .zenzic.toml — Z602 I18N_PARITY gallery example
#
# docs/en/ has two pages: index.md (3 sections) and guide.md (2 sections).
# docs/it/ only has index.md — guide.md is missing from the IT locale.
# Zenzic flags the missing IT mirror of guide.md as Z602 I18N_PARITY.
#
# Expected results:
#   zenzic check i18n    → EXIT 1  (Z602 ×1 — guide.md missing in IT)
#   zenzic check all     → EXIT 1

docs_dir = "docs"
fail_under = 0

[build_context]
engine       = "standalone"
default_locale = "en"
locales      = ["it"]

[i18n]
enabled = true
