<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" role="img" aria-label="Zenzic Virtual Site Map — filesystem projection to canonical routes">
  <title>Zenzic — Virtual Site Map (VSM) Projection</title>

  <defs>
    <marker id="vsm-ar" viewBox="0 0 10 8" markerWidth="8" markerHeight="6" refX="9" refY="4" orient="auto">
      <path d="M0 0 L10 4 L0 8Z" fill="#475569"/>
    </marker>
    <marker id="vsm-ar-b" viewBox="0 0 10 8" markerWidth="8" markerHeight="6" refX="9" refY="4" orient="auto">
      <path d="M0 0 L10 4 L0 8Z" fill="#4f46e5"/>
    </marker>
    <marker id="vsm-ar-s" viewBox="0 0 10 8" markerWidth="8" markerHeight="6" refX="9" refY="4" orient="auto">
      <path d="M0 0 L10 4 L0 8Z" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="460" rx="12" fill="#0c0c10"/>

  <!-- Title -->
  <text x="380" y="30" text-anchor="middle" fill="#c7d2fe" font-family="Inter,Geist,system-ui,sans-serif" font-size="14" font-weight="700">Virtual Site Map — Single Source of Truth for Routing</text>
  <text x="380" y="46" text-anchor="middle" fill="#3730a3" font-family="Inter,system-ui,sans-serif" font-size="10">canonical_url → RouteMetadata · constructed once per CLI invocation</text>

  <!-- ── LEFT PANEL: Filesystem ──────────────────────────────── -->
  <rect x="16" y="58" width="220" height="338" rx="8" fill="#111118" stroke="#3730a3" stroke-width="1.5"/>
  <text x="126" y="78" text-anchor="middle" fill="#a1a1aa" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="0.05em">FILESYSTEM</text>

  <!-- File entries -->
  <!-- docs/guide/ -->
  <text x="36" y="100" fill="#64748b" font-family="Inter,system-ui,monospace" font-size="10">docs/</text>
  <text x="48" y="116" fill="#64748b" font-family="Inter,system-ui,monospace" font-size="10">guide/</text>
  <rect x="52" y="122" width="160" height="22" rx="4" fill="#0c0c10" stroke="#3730a3" stroke-width="1"/>
  <text x="62" y="137" fill="#818cf8" font-family="Inter,system-ui,monospace" font-size="10">install.mdx</text>
  <rect x="52" y="150" width="160" height="22" rx="4" fill="#0c0c10" stroke="#3730a3" stroke-width="1"/>
  <text x="62" y="165" fill="#818cf8" font-family="Inter,system-ui,monospace" font-size="10">overview.mdx</text>
  <rect x="52" y="178" width="160" height="22" rx="4" fill="#0c0c10" stroke="#3730a3" stroke-width="1"/>
  <text x="62" y="193" fill="#818cf8" font-family="Inter,system-ui,monospace" font-size="10">faq.mdx</text>

  <!-- docs/legacy/ (orphan) -->
  <text x="48" y="216" fill="#64748b" font-family="Inter,system-ui,monospace" font-size="10">legacy/</text>
  <rect x="52" y="222" width="160" height="22" rx="4" fill="#0c0c10" stroke="#f59e0b" stroke-width="1"/>
  <text x="62" y="237" fill="#f59e0b" font-family="Inter,system-ui,monospace" font-size="10">old-page.mdx</text>

  <!-- blog/ -->
