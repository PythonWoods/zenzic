  <rect x="686" y="132" width="38" height="18" rx="3" fill="#059669"/>
  <text x="705" y="144" text-anchor="middle" fill="#ecfdf5" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="700">OK</text>

  <rect x="536" y="162" width="196" height="28" rx="4" fill="#001a10" stroke="#10b981" stroke-width="1"/>
  <text x="546" y="180" fill="#10b981" font-family="Inter,system-ui,monospace" font-size="10" font-weight="600">/guide/overview/</text>
  <rect x="686" y="166" width="38" height="18" rx="3" fill="#059669"/>
  <text x="705" y="178" text-anchor="middle" fill="#ecfdf5" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="700">OK</text>

  <rect x="536" y="196" width="196" height="28" rx="4" fill="#001a10" stroke="#10b981" stroke-width="1"/>
  <text x="546" y="214" fill="#10b981" font-family="Inter,system-ui,monospace" font-size="10" font-weight="600">/guide/faq/</text>
  <rect x="686" y="200" width="38" height="18" rx="3" fill="#059669"/>
  <text x="705" y="212" text-anchor="middle" fill="#ecfdf5" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="700">OK</text>

  <!-- ORPHAN route -->
  <rect x="536" y="242" width="196" height="28" rx="4" fill="#1a0d00" stroke="#f59e0b" stroke-width="1"/>
  <text x="546" y="260" fill="#f59e0b" font-family="Inter,system-ui,monospace" font-size="10" font-weight="600">/legacy/old-page/</text>
  <rect x="674" y="246" width="50" height="18" rx="3" fill="#92400e"/>
  <text x="699" y="258" text-anchor="middle" fill="#fef3c7" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="700">ORPHAN</text>

  <!-- blog -->
  <rect x="536" y="276" width="196" height="28" rx="4" fill="#001a10" stroke="#10b981" stroke-width="1"/>
  <text x="546" y="294" fill="#10b981" font-family="Inter,system-ui,monospace" font-size="10" font-weight="600">/blog/2026-04-22-release/</text>
  <rect x="686" y="280" width="38" height="18" rx="3" fill="#059669"/>
  <text x="705" y="292" text-anchor="middle" fill="#ecfdf5" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="700">OK</text>

  <!-- GHOST route -->
  <rect x="536" y="310" width="196" height="28" rx="4" fill="#0f0f15" stroke="#475569" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="546" y="328" fill="#64748b" font-family="Inter,system-ui,monospace" font-size="10" font-weight="600">/api/reference/</text>
  <rect x="676" y="314" width="46" height="18" rx="3" fill="#1e2533"/>
  <text x="699" y="326" text-anchor="middle" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="700">GHOST</text>

  <!-- Status legend -->
  <rect x="536" y="360" width="8" height="8" rx="2" fill="#059669"/>
  <text x="550" y="368" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="9">REACHABLE — in nav or surfaced by adapter</text>
  <rect x="536" y="376" width="8" height="8" rx="2" fill="#92400e"/>
  <text x="550" y="384" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="9">ORPHAN — exists but not reachable from nav</text>
  <rect x="536" y="392" width="8" height="8" rx="2" fill="#1e2533" stroke="#475569" stroke-width="1"/>
  <text x="550" y="400" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="9">GHOST — build-generated, no source file</text>

  <!-- ── BOTTOM: consumers ─────────────────────────────────────── -->
  <line x1="380" y1="396" x2="380" y2="418" stroke="#4f46e5" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="380" y="432" text-anchor="middle" fill="#3730a3" font-family="Inter,system-ui,sans-serif" font-size="10">consumed by: Link Validator · Orphan Detector · Nav Contract checker</text>
  <text x="380" y="447" text-anchor="middle" fill="#1e1e2e" font-family="Inter,system-ui,sans-serif" font-size="10">LayeredExclusionManager applied at discovery phase</text>
