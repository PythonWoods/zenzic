  <text x="36" y="312" fill="#64748b" font-family="Inter,system-ui,monospace" font-size="10">build outputs (generated)</text>
  <rect x="52" y="318" width="160" height="22" rx="4" fill="#0c0c10" stroke="#475569" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="62" y="333" fill="#64748b" font-family="Inter,system-ui,monospace" font-size="10">api/reference/ (virtual)</text>

  <!-- ── CENTER PANEL: VSMBuilder ─────────────────────────────── -->
  <rect x="264" y="78" width="232" height="298" rx="8" fill="#111118" stroke="#4f46e5" stroke-width="1.5"/>

  <!-- VSMBuilder main box -->
  <rect x="280" y="98" width="200" height="54" rx="6" fill="#1e1e2e" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="380" y="118" text-anchor="middle" fill="#c7d2fe" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="700">VSMBuilder</text>
  <text x="380" y="135" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">constructed once per CLI invocation</text>
  <text x="380" y="148" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">cached by (engine, docs_root, repo_root)</text>

  <!-- Adapter Protocol sub-box -->
  <rect x="280" y="168" width="200" height="52" rx="6" fill="#0c0c10" stroke="#3730a3" stroke-width="1"/>
  <text x="380" y="187" text-anchor="middle" fill="#818cf8" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Adapter Protocol</text>
  <text x="380" y="202" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">map_url() · classify_route()</text>
  <text x="380" y="215" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">get_route_info() · provides_index()</text>

  <!-- Filesystem Discovery sub-box -->
  <rect x="280" y="232" width="200" height="42" rx="6" fill="#0c0c10" stroke="#3730a3" stroke-width="1"/>
  <text x="380" y="250" text-anchor="middle" fill="#818cf8" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Filesystem Discovery</text>
  <text x="380" y="264" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">walk_files() · iter_markdown_sources()</text>

  <!-- InMemoryPathResolver sub-box -->
  <rect x="280" y="286" width="200" height="42" rx="6" fill="#0c0c10" stroke="#3730a3" stroke-width="1"/>
  <text x="380" y="304" text-anchor="middle" fill="#818cf8" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">InMemoryPathResolver</text>
  <text x="380" y="318" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">alias map · zero disk I/O hot path</text>

  <!-- VSM output label -->
  <text x="380" y="356" text-anchor="middle" fill="#3730a3" font-family="Inter,system-ui,sans-serif" font-size="10" font-style="italic">↓ produces Route catalog</text>

  <!-- Arrows: files → VSMBuilder (left panel to center) -->
  <line x1="212" y1="133" x2="264" y2="175" stroke="#4f46e5" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#vsm-ar-b)"/>
  <line x1="212" y1="161" x2="264" y2="185" stroke="#4f46e5" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#vsm-ar-b)"/>
  <line x1="212" y1="189" x2="264" y2="195" stroke="#4f46e5" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#vsm-ar-b)"/>
  <line x1="212" y1="233" x2="264" y2="220" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#vsm-ar-b)"/>
  <line x1="212" y1="279" x2="264" y2="250" stroke="#4f46e5" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#vsm-ar-b)"/>
  <line x1="212" y1="329" x2="264" y2="300" stroke="#475569" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#vsm-ar)"/>

  <!-- Arrows: VSMBuilder → Route catalog (center to right panel) -->
  <line x1="496" y1="200" x2="524" y2="160" stroke="#10b981" stroke-width="1.5" marker-end="url(#vsm-ar-s)"/>
  <line x1="496" y1="210" x2="524" y2="198" stroke="#10b981" stroke-width="1.5" marker-end="url(#vsm-ar-s)"/>
  <line x1="496" y1="220" x2="524" y2="236" stroke="#10b981" stroke-width="1.5" marker-end="url(#vsm-ar-s)"/>
  <line x1="496" y1="230" x2="524" y2="274" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#vsm-ar)"/>
  <line x1="496" y1="240" x2="524" y2="312" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#vsm-ar)"/>

  <!-- ── RIGHT PANEL: Route Catalog ──────────────────────────── -->
  <rect x="524" y="58" width="220" height="338" rx="8" fill="#111118" stroke="#3730a3" stroke-width="1.5"/>
  <text x="634" y="78" text-anchor="middle" fill="#a1a1aa" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="0.05em">ROUTE CATALOG</text>

