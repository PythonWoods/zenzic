<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 548" role="img" aria-label="Zenzic Two-Pass Analysis Pipeline">
  <title>Zenzic — Two-Pass Analysis Pipeline</title>

  <defs>
    <marker id="pf-ar"  viewBox="0 0 10 8" markerWidth="8" markerHeight="6" refX="9" refY="4" orient="auto">
      <path d="M0 0 L10 4 L0 8Z" fill="#475569"/>
    </marker>
    <marker id="pf-ar-e" viewBox="0 0 10 8" markerWidth="8" markerHeight="6" refX="9" refY="4" orient="auto">
      <path d="M0 0 L10 4 L0 8Z" fill="#f43f5e"/>
    </marker>
    <marker id="pf-ar-s" viewBox="0 0 10 8" markerWidth="8" markerHeight="6" refX="9" refY="4" orient="auto">
      <path d="M0 0 L10 4 L0 8Z" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="548" rx="12" fill="#0c0c10"/>

  <!-- ── FILE SET (input) ─────────────────────────────────────── -->
  <rect x="280" y="20" width="200" height="48" rx="8" fill="#111118" stroke="#4f46e5" stroke-width="2"/>
  <text x="380" y="40" text-anchor="middle" fill="#c7d2fe" font-family="Inter,Geist,system-ui,sans-serif" font-size="13" font-weight="700">File Set</text>
  <text x="380" y="57" text-anchor="middle" fill="#475569" font-family="Inter,Geist,system-ui,sans-serif" font-size="10">docs/**/*.md · docs/**/*.mdx</text>

  <!-- Arrow: File Set → Pass 1 -->
  <line x1="380" y1="68" x2="380" y2="90" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#pf-ar)"/>

  <!-- ── PASS 1 container ─────────────────────────────────────── -->
  <rect x="16" y="94" width="728" height="186" rx="10" fill="#111118" stroke="#3730a3" stroke-width="1.5"/>

  <!-- Pass 1 badge -->
  <rect x="32" y="104" width="66" height="20" rx="4" fill="#1e1e2e" stroke="#4f46e5" stroke-width="1"/>
  <text x="65" y="118" text-anchor="middle" fill="#818cf8" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" letter-spacing="0.08em">PASS 1</text>
  <text x="108" y="118" fill="#a1a1aa" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Harvest &amp; Credential Scan</text>

  <!-- Credential Stream sub-box -->
  <rect x="32" y="130" width="216" height="96" rx="6" fill="#0c0c10" stroke="#3730a3" stroke-width="1"/>
  <text x="140" y="150" text-anchor="middle" fill="#e4e4e7" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600">Credential Stream</text>
  <text x="140" y="167" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">Every raw line · ZRT-006/007</text>
  <text x="140" y="181" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">8 compiled regex families</text>
  <text x="140" y="195" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">1-line lookback buffer (ZRT-007)</text>
  <text x="140" y="209" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">1 MiB anti-ReDoS hard cap</text>

  <!-- Content Stream sub-box -->
  <rect x="272" y="130" width="216" height="96" rx="6" fill="#0c0c10" stroke="#3730a3" stroke-width="1"/>
  <text x="380" y="150" text-anchor="middle" fill="#e4e4e7" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600">Content Stream</text>
  <text x="380" y="167" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">Fenced-block aware state machine</text>
  <text x="380" y="181" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">Harvest DEF / IMG events</text>
  <text x="380" y="195" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">No code-block leakage</text>
  <text x="380" y="209" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">CommonMark 4.7 duplicate rules</text>

  <!-- ReferenceMap sub-box -->
  <rect x="512" y="134" width="216" height="84" rx="6" fill="#001a10" stroke="#10b981" stroke-width="1"/>
  <text x="620" y="155" text-anchor="middle" fill="#10b981" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700">ReferenceMap</text>
  <text x="620" y="172" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">per-file definition store</text>
  <text x="620" y="186" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">DEF · DUPLICATE_DEF · IMG</text>
  <text x="620" y="200" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">MISSING_ALT events</text>

  <!-- Arrow: Content Stream → ReferenceMap -->
  <line x1="488" y1="176" x2="512" y2="176" stroke="#10b981" stroke-width="1.5" marker-end="url(#pf-ar-s)"/>

  <!-- SECRET exit box (inside Pass 1, below Credential Scan) -->
  <rect x="32" y="240" width="216" height="26" rx="4" fill="#1a0005" stroke="#f43f5e" stroke-width="1"/>
  <text x="140" y="257" text-anchor="middle" fill="#f43f5e" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">SECRET detected → Exit(2) immediately</text>

  <!-- Arrow: Credential Scan → SECRET (dashed, error) -->
  <line x1="140" y1="226" x2="140" y2="240" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#pf-ar-e)"/>

  <!-- "if no SECRET" annotation -->
  <text x="312" y="256" fill="#3730a3" font-family="Inter,system-ui,sans-serif" font-size="10" font-style="italic">↓ if no SECRET event</text>

  <!-- ── Arrow: Pass 1 → Pass 2 ──────────────────────────────── -->
  <line x1="380" y1="280" x2="380" y2="302" stroke="#475569" stroke-width="1.5" marker-end="url(#pf-ar)"/>

  <!-- ── PASS 2 ────────────────────────────────────────────────── -->
  <rect x="110" y="304" width="540" height="76" rx="10" fill="#111118" stroke="#3730a3" stroke-width="1.5"/>
  <rect x="126" y="314" width="66" height="20" rx="4" fill="#1e1e2e" stroke="#4f46e5" stroke-width="1"/>
  <text x="159" y="328" text-anchor="middle" fill="#818cf8" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" letter-spacing="0.08em">PASS 2</text>
  <text x="202" y="328" fill="#a1a1aa" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Cross-Check &amp; Link Validation</text>
  <text x="380" y="349" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">Resolve reference-style links against ReferenceMap · detect DANGLING_REF / dead DEF</text>
  <text x="380" y="363" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">Phase 1→1.5 (cycle DFS)→2→3 link pipeline · async HTTP HEAD (strict mode, 20 workers)</text>

  <!-- ── Arrow: Pass 2 → Pass 3 ──────────────────────────────── -->
  <line x1="380" y1="380" x2="380" y2="402" stroke="#475569" stroke-width="1.5" marker-end="url(#pf-ar)"/>

  <!-- ── PASS 3 ────────────────────────────────────────────────── -->
  <rect x="110" y="404" width="540" height="76" rx="10" fill="#111118" stroke="#3730a3" stroke-width="1.5"/>
  <rect x="126" y="414" width="66" height="20" rx="4" fill="#1e1e2e" stroke="#4f46e5" stroke-width="1"/>
  <text x="159" y="428" text-anchor="middle" fill="#818cf8" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" letter-spacing="0.08em">PASS 3</text>
  <text x="202" y="428" fill="#a1a1aa" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Integrity Report</text>
  <text x="380" y="449" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">Dangling refs · Dead definitions · Duplicate IDs · Security findings</text>
  <text x="380" y="463" text-anchor="middle" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="10">Adaptive Rule Engine output · Per-file score · Hybrid sequential / parallel dispatch</text>

  <!-- ── Arrow: Pass 3 → Report ──────────────────────────────── -->
  <line x1="380" y1="480" x2="380" y2="500" stroke="#10b981" stroke-width="1.5" marker-end="url(#pf-ar-s)"/>

  <!-- ── QUALITY REPORT (output) ─────────────────────────────── -->
  <rect x="210" y="502" width="340" height="34" rx="8" fill="#001a10" stroke="#10b981" stroke-width="2"/>
  <text x="380" y="524" text-anchor="middle" fill="#10b981" font-family="Inter,Geist,system-ui,sans-serif" font-size="13" font-weight="700">Quality Report  ·  Exit 0 / 1 / 2 / 3</text>
</svg>
