<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 660" width="560" height="660" role="img" aria-label="Zenzic Credential normalization algorithm — 8-step pipeline">
  <title>Zenzic — Credential Normalization Algorithm (8 Steps)</title>

  <defs>
    <marker id="sn-ar" viewBox="0 0 10 8" markerWidth="8" markerHeight="6" refX="9" refY="4" orient="auto">
      <path d="M0 0 L10 4 L0 8Z" fill="#475569"/>
    </marker>
    <marker id="sn-ar-e" viewBox="0 0 10 8" markerWidth="8" markerHeight="6" refX="9" refY="4" orient="auto">
      <path d="M0 0 L10 4 L0 8Z" fill="#e11d48"/>
    </marker>
    <marker id="sn-ar-s" viewBox="0 0 10 8" markerWidth="8" markerHeight="6" refX="9" refY="4" orient="auto">
      <path d="M0 0 L10 4 L0 8Z" fill="#059669"/>
    </marker>
    <marker id="sn-ar-g" viewBox="0 0 10 8" markerWidth="8" markerHeight="6" refX="9" refY="4" orient="auto">
      <path d="M0 0 L10 4 L0 8Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="280" y="28" text-anchor="middle" fill="#1e1b4b" font-family="Inter,Geist,system-ui,sans-serif" font-size="14" font-weight="700">Credential Normalization Algorithm</text>
  <text x="280" y="44" text-anchor="middle" fill="#312e81" font-family="Inter,system-ui,sans-serif" font-size="10">8-step pre-scan pipeline · every line · every file</text>

  <!-- ── INPUT ─────────────────────────────────────────────────── -->
  <rect x="140" y="54" width="280" height="34" rx="8" fill="#f8fafc" stroke="#4f46e5" stroke-width="2"/>
  <text x="280" y="76" text-anchor="middle" fill="#1e1b4b" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700">Raw Line  (from file)</text>

  <line x1="280" y1="88" x2="280" y2="104" stroke="#475569" stroke-width="1.5" marker-end="url(#sn-ar)"/>

  <!-- Step 1 — Unicode Format Chars -->
  <rect x="60" y="106" width="440" height="44" rx="6" fill="#f8fafc" stroke="#6366f1" stroke-width="1"/>
  <rect x="72" y="112" width="66" height="18" rx="3" fill="#eef2ff" stroke="#4f46e5" stroke-width="1"/>
  <text x="105" y="124" text-anchor="middle" fill="#3730a3" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="700">ZRT-006 · 1</text>
  <text x="150" y="124" fill="#18181b" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Strip Unicode Format Characters</text>
  <text x="150" y="139" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="10">Cf category · zero-width joiners · soft hyphens · invisible glyphs</text>

  <line x1="280" y1="150" x2="280" y2="162" stroke="#475569" stroke-width="1.5" marker-end="url(#sn-ar)"/>

  <!-- Step 2 — HTML Entity Decode -->
  <rect x="60" y="164" width="440" height="44" rx="6" fill="#f8fafc" stroke="#6366f1" stroke-width="1"/>
  <rect x="72" y="170" width="66" height="18" rx="3" fill="#eef2ff" stroke="#4f46e5" stroke-width="1"/>
  <text x="105" y="182" text-anchor="middle" fill="#3730a3" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="700">ZRT-006 · 2</text>
  <text x="150" y="182" fill="#18181b" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Decode HTML Character References</text>
  <text x="150" y="197" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="10">sk&amp;#45;abc → sk-abc · numeric &amp; named entities</text>

  <line x1="280" y1="208" x2="280" y2="220" stroke="#475569" stroke-width="1.5" marker-end="url(#sn-ar)"/>

  <!-- Step 3 — Comment Interleave Strip -->
  <rect x="60" y="222" width="440" height="44" rx="6" fill="#f8fafc" stroke="#6366f1" stroke-width="1"/>
  <rect x="72" y="228" width="66" height="18" rx="3" fill="#eef2ff" stroke="#4f46e5" stroke-width="1"/>
  <text x="105" y="240" text-anchor="middle" fill="#3730a3" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="700">ZRT-007 · 3</text>
  <text x="150" y="240" fill="#18181b" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Strip HTML/MDX Comment Interleaving</text>
  <text x="150" y="255" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="10">AKIA&lt;!-- --&gt;KEY → AKIAKEY · splits across comment boundaries</text>

  <line x1="280" y1="266" x2="280" y2="278" stroke="#475569" stroke-width="1.5" marker-end="url(#sn-ar)"/>

  <!-- Step 4 — Backtick Span Unwrap -->
  <rect x="60" y="280" width="440" height="44" rx="6" fill="#f8fafc" stroke="#6366f1" stroke-width="1"/>
  <rect x="72" y="286" width="66" height="18" rx="3" fill="#eef2ff" stroke="#4f46e5" stroke-width="1"/>
  <text x="105" y="298" text-anchor="middle" fill="#3730a3" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="700">ZRT-003 · 4</text>
  <text x="150" y="298" fill="#18181b" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Unwrap Backtick Spans</text>
  <text x="150" y="313" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="10">`AKIA` → AKIA · inline code delimiters removed</text>

  <line x1="280" y1="324" x2="280" y2="336" stroke="#475569" stroke-width="1.5" marker-end="url(#sn-ar)"/>

  <!-- Step 5 — Concat Operator Remove -->
  <rect x="60" y="338" width="440" height="44" rx="6" fill="#f8fafc" stroke="#6366f1" stroke-width="1"/>
  <rect x="72" y="344" width="66" height="18" rx="3" fill="#eef2ff" stroke="#4f46e5" stroke-width="1"/>
  <text x="105" y="356" text-anchor="middle" fill="#3730a3" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="700">ZRT-003 · 5</text>
  <text x="150" y="356" fill="#18181b" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Remove Concatenation Operators</text>
  <text x="150" y="371" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="10">"AKIA" + "KEY" → AKIAKEY · Python / JS string concat obfuscation</text>

  <line x1="280" y1="382" x2="280" y2="394" stroke="#475569" stroke-width="1.5" marker-end="url(#sn-ar)"/>

  <!-- Step 6 — Table Pipe Replace -->
  <rect x="60" y="396" width="440" height="44" rx="6" fill="#f8fafc" stroke="#6366f1" stroke-width="1"/>
  <rect x="72" y="402" width="66" height="18" rx="3" fill="#eef2ff" stroke="#4f46e5" stroke-width="1"/>
  <text x="105" y="414" text-anchor="middle" fill="#3730a3" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="700">ZRT-003 · 6</text>
  <text x="150" y="414" fill="#18181b" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Replace Table Pipes</text>
  <text x="150" y="429" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="10">| Key | AKIA... | → Key AKIA... · Markdown table cell content extracted</text>

  <!-- Dual scan fork label -->
  <line x1="280" y1="440" x2="280" y2="454" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="280" y="468" text-anchor="middle" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="10">raw form + normalized form — both scanned</text>

  <!-- Fork lines to Step 7 and Step 8 -->
  <line x1="280" y1="454" x2="160" y2="476" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#sn-ar-e)"/>
  <line x1="280" y1="454" x2="400" y2="476" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#sn-ar-e)"/>

  <!-- Step 7 — Scan Raw -->
  <rect x="60" y="478" width="196" height="44" rx="6" fill="#fff1f2" stroke="#e11d48" stroke-width="1.5"/>
  <text x="158" y="497" text-anchor="middle" fill="#e11d48" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700">Scan Raw Form</text>
  <text x="158" y="512" text-anchor="middle" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="10">8 regex families · raw tokens</text>

  <!-- Step 8 — Scan Normalized -->
  <rect x="304" y="478" width="196" height="44" rx="6" fill="#fff1f2" stroke="#e11d48" stroke-width="1.5"/>
  <text x="402" y="497" text-anchor="middle" fill="#e11d48" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700">Scan Normalized Form</text>
  <text x="402" y="512" text-anchor="middle" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="10">reassembled token · split-obfuscation</text>

  <!-- Merge back -->
  <line x1="158" y1="522" x2="280" y2="542" stroke="#e11d48" stroke-width="1.5" marker-end="url(#sn-ar-e)"/>
  <line x1="402" y1="522" x2="280" y2="542" stroke="#e11d48" stroke-width="1.5" marker-end="url(#sn-ar-e)"/>

  <!-- Deduplicate box -->
  <rect x="140" y="544" width="280" height="34" rx="6" fill="#f8fafc" stroke="#b45309" stroke-width="1.5"/>
  <text x="280" y="566" text-anchor="middle" fill="#b45309" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Deduplicate (same secret type per line)</text>

  <line x1="280" y1="578" x2="280" y2="592" stroke="#475569" stroke-width="1.5"/>

  <!-- Output fork -->
  <line x1="280" y1="592" x2="160" y2="610" stroke="#e11d48" stroke-width="1.5" marker-end="url(#sn-ar-e)"/>
  <line x1="280" y1="592" x2="400" y2="610" stroke="#475569" stroke-width="1.5" marker-end="url(#sn-ar-g)"/>

  <!-- SecurityFinding output -->
  <rect x="64" y="612" width="192" height="32" rx="6" fill="#fff1f2" stroke="#e11d48" stroke-width="1.5"/>
  <text x="160" y="632" text-anchor="middle" fill="#e11d48" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700">SecurityFinding → Exit(2)</text>

  <!-- Pass-through output -->
  <rect x="304" y="612" width="192" height="32" rx="6" fill="#f8fafc" stroke="#475569" stroke-width="1"/>
  <text x="400" y="632" text-anchor="middle" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="11">Pass-through to parser</text>
</svg>
